server {
  listen 80;
  server_name ruse.monostack.in ruseapi.monostack.in;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name ruse.monostack.in;
  ssl_certificate /etc/letsencrypt/live/ruse.monostack.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ruse.monostack.in/privkey.pem;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
  add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; frame-ancestors 'none'" always;

  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name ruseapi.monostack.in;
  ssl_certificate /etc/letsencrypt/live/ruseapi.monostack.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ruseapi.monostack.in/privkey.pem;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;

  location / {
    proxy_pass http://127.0.0.1:8091;
    proxy_buffering off;
    proxy_read_timeout 3600;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
  }
}
