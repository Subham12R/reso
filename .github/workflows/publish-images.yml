name: Publish Docker images

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - server/**
      - .github/workflows/publish-images.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: reso-frontend
            context: frontend
          - image: reso-api
            context: server
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/subham12r/${{ matrix.image }}:latest
            ghcr.io/subham12r/${{ matrix.image }}:${{ github.sha }}
