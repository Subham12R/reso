services:
  frontend:
    image: ghcr.io/subham12r/ruse-frontend:latest
    depends_on:
      - api
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3001}:3000"
    restart: unless-stopped

  api:
    image: ghcr.io/subham12r/ruse-api:latest
    env_file: .env.production
    environment:
      PORT: "8080"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_PORT:-8081}:8080"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
